name: CI - Build, Scan, Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/emart

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set Commit SHA Tag
    - name: Set Image Tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 3. Docker Login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4. Build Images
    - name: Build Images
      run: |
        docker build -t $IMAGE_PREFIX-frontend:$TAG ./app/client
        docker build -t $IMAGE_PREFIX-node-api:$TAG ./app/node-api
        docker build -t $IMAGE_PREFIX-java-api:$TAG ./app/java-api

        docker tag $IMAGE_PREFIX-frontend:$TAG $IMAGE_PREFIX-frontend:latest
        docker tag $IMAGE_PREFIX-node-api:$TAG $IMAGE_PREFIX-node-api:latest
        docker tag $IMAGE_PREFIX-java-api:$TAG $IMAGE_PREFIX-java-api:latest

    # 5. Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    # 6. Scan Images (FAIL on HIGH/CRITICAL)
    - name: Trivy Scan - Node API
      trivy image --scanners vuln --exit-code 1 --severity HIGH,CRITICAL $IMAGE_PREFIX-node-api:$TAG

    - name: Trivy Scan - Java API
      trivy image --scanners vuln --exit-code 1 --severity HIGH,CRITICAL $IMAGE_PREFIX-java-api:$TAG

    - name: Trivy Scan - Frontend
      trivy image --scanners vuln --ignore-unfixed --exit-code 1 --severity CRITICAL $IMAGE_PREFIX-frontend:$TAG

    # 7. Push Images
    - name: Push Images
      run: |
        docker push $IMAGE_PREFIX-frontend:$TAG
        docker push $IMAGE_PREFIX-frontend:latest

        docker push $IMAGE_PREFIX-node-api:$TAG
        docker push $IMAGE_PREFIX-node-api:latest

        docker push $IMAGE_PREFIX-java-api:$TAG
        docker push $IMAGE_PREFIX-java-api:latest
